<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Wars Audio Game</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top, #1a1f2a 0%, #090b11 70%);
            color: #f2f5ff;
            min-height: 100vh;
            display: grid;
            place-items: center;
        }

        main {
            width: min(560px, 92vw);
            padding: 28px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            background: rgba(9, 13, 24, 0.82);
            box-shadow: 0 16px 36px rgba(0, 0, 0, 0.45);
        }

        h1 {
            margin-top: 0;
            margin-bottom: 12px;
            letter-spacing: 0.04em;
        }

        p {
            line-height: 1.5;
            margin: 10px 0;
        }

        #menu {
            margin-top: 18px;
            display: grid;
            gap: 10px;
        }

        #menu button {
            width: 100%;
            border: 1px solid rgba(135, 173, 255, 0.45);
            border-radius: 10px;
            background: rgba(20, 29, 48, 0.85);
            color: #dce7ff;
            text-align: left;
            padding: 14px 16px;
            font-size: 1rem;
            cursor: default;
        }

        #menu button.is-selected {
            border-color: #9fd2ff;
            background: rgba(39, 67, 112, 0.9);
            box-shadow: 0 0 0 2px rgba(159, 210, 255, 0.2);
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
    </style>
</head>
<body>
    <main>
        <h1>Star Wars Audio Game</h1>
        <p>Use Arrow Up and Arrow Down to move in menus. Press Enter to select. Press Escape on a submenu to go back.</p>
        <p>In-game: use the arrow keys to move and jump. Press spacebar to swing your lightsaber. Press H to hear your health.</p>
        <p id="health-announcement" aria-live="polite">Health: 100</p>

        <div id="menu" role="presentation" aria-hidden="true"></div>
    </main>

    <p id="menu-announcement" class="sr-only" aria-live="assertive" aria-atomic="true"></p>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
